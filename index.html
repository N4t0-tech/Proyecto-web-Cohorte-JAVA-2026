<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio Cohorte 24 — Javalimos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <h1 class="site-header__title">Javalimos</h1>
      <p class="site-header__tagline">Cohorte 24 · Portafolio de desarrolladores</p>
    </div>
  </header>

  <main>

    <section class="hero">
      <div class="container">
        <h2 class="hero__title">Conoce al equipo</h2>
        <p class="hero__description">
          Un grupo de desarrolladores comprometidos con el aprendizaje,
          la colaboración y la construcción de proyectos reales.
        </p>
      </div>
    </section>

    <section class="gallery" aria-label="Galería de perfiles">
      <div class="container">
        <div class="gallery__grid" id="profiles-grid"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="site-footer__text">Cohorte 24 — Javalimos &copy; 2026</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
