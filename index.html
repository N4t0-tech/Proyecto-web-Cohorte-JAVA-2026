<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio Cohorte 24 — Javalimos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@100..800&display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="site-header__top">
        <img class="site-header__logo" src="images/Javalimosicon2.png" alt="Javalimos logo featuring a stylized lime with the text Javalimos, representing the developer cohort 2026 community">
        <div class="site-header__brand">
          <img class="site-header__title-img" src="images/headerTitle.png" alt="Javalimos">
        </div>
        <button class="theme-toggle" id="theme-toggle" role="switch" aria-checked="false" aria-label="Alternar modo oscuro/claro">
          <span class="theme-toggle__thumb">
            <span class="theme-toggle__icon">🌙</span>
          </span>
        </button>
      </div>
      <p class="site-header__tagline">Cohorte 24 · Portafolio de desarrolladores</p>
    </div>
  </header>

  <main>

    <section class="hero">
      <div class="container">
        <h2 class="hero__title">Conoce al equipo</h2>
        <p class="hero__description">
          Un grupo de desarrolladores comprometidos con el aprendizaje,
          la colaboración y la construcción de proyectos reales.
        </p>
        <p class="hero__count"><span id="dev-count">0</span> desarrolladores</p>
      </div>
    </section>

    <section class="gallery" aria-label="Galería de perfiles">
      <div class="container">
        <div class="gallery__grid" id="profiles-grid"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="site-footer__text">Cohorte 24 — Javalimos &copy; 2026</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
